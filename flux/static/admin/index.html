<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            line-height: 1.6;
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #00d4aa; margin-bottom: 0.5rem; }
        h2 { color: #00d4aa; margin: 1.5rem 0 0.5rem; font-size: 1.1rem; }
        .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .card {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #2a2a4e;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid #2a2a4e; }
        th { color: #00d4aa; font-weight: 600; }
        tr:hover { background: #222244; }
        .status-pending { color: #f0ad4e; }
        .status-approved { color: #5cb85c; }
        .status-rejected { color: #d9534f; }
        .status-enabled { color: #5cb85c; }
        .status-disabled { color: #d9534f; }
        button {
            background: #00d4aa;
            color: #0f0f23;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }
        button:hover { background: #00ffc8; }
        button.secondary {
            background: #2a2a4e;
            color: #e0e0e0;
        }
        button.secondary:hover { background: #3a3a6e; }
        button.danger {
            background: #d9534f;
            color: #fff;
        }
        input, select {
            background: #0f0f23;
            color: #e0e0e0;
            border: 1px solid #2a2a4e;
            padding: 0.4rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .form-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; flex-wrap: wrap; }
        .form-row label { min-width: 100px; font-size: 0.9rem; }
        .form-row input, .form-row select { flex: 1; min-width: 150px; }
        .actions { display: flex; gap: 0.5rem; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }
        .stat-box { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: #00d4aa; }
        .stat-label { font-size: 0.8rem; color: #888; }
        .message {
            padding: 0.5rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }
        .message.success { background: #1a3a1a; color: #5cb85c; }
        .message.error { background: #3a1a1a; color: #d9534f; }
        pre { background: #0f0f23; padding: 0.5rem; border-radius: 4px; overflow-x: auto; font-size: 0.8rem; }
        @media (max-width: 600px) {
            body { padding: 0.5rem; }
            .form-row { flex-direction: column; align-items: stretch; }
            .form-row label { min-width: auto; }
            table { font-size: 0.8rem; }
            th, td { padding: 0.3rem; }
        }
    </style>
</head>
<body>
    <h1>Flux Admin</h1>
    <p class="subtitle">Content automation engine — Phase 1 Core Engine</p>

    <div id="msg-area"></div>

    <!-- Dashboard -->
    <h2>Dashboard</h2>
    <div class="card">
        <div class="stats-grid" id="dashboard-stats">
            <div class="stat-box">
                <div class="stat-value" id="stat-pipelines">-</div>
                <div class="stat-label">Pipelines</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="stat-workers">-</div>
                <div class="stat-label">Workers</div>
            </div>
        </div>
    </div>

    <!-- Pipelines -->
    <h2>Pipelines</h2>
    <div class="card">
        <div class="form-row">
            <label>Name:</label>
            <input type="text" id="pl-name" placeholder="My Pipeline">
            <label>Plugin:</label>
            <select id="pl-plugin">
                <option value="quran_shorts">Quran Shorts</option>
            </select>
            <button onclick="createPipeline()">Create</button>
        </div>
        <table>
            <thead>
                <tr><th>Name</th><th>Plugin</th><th>Status</th><th>Created</th><th>Actions</th></tr>
            </thead>
            <tbody id="pipelines-tbody"></tbody>
        </table>
    </div>

    <!-- Workers -->
    <h2>Platform Workers</h2>
    <div class="card">
        <div class="form-row">
            <label>Platform:</label>
            <select id="wk-platform">
                <option value="youtube">YouTube</option>
                <option value="telegram">Telegram</option>
                <option value="instagram">Instagram</option>
                <option value="tiktok">TikTok</option>
                <option value="x">X / Twitter</option>
            </select>
            <label>Name:</label>
            <input type="text" id="wk-name" placeholder="My Channel">
            <button onclick="createWorker()">Create</button>
        </div>
        <table>
            <thead>
                <tr><th>Platform</th><th>Name</th><th>Schedule</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="workers-tbody"></tbody>
        </table>
    </div>

    <!-- Activity Log -->
    <h2>Recent Activity</h2>
    <div class="card">
        <table>
            <thead>
                <tr><th>Time</th><th>Level</th><th>Event</th><th>Message</th></tr>
            </thead>
            <tbody id="activity-tbody"></tbody>
        </table>
    </div>

    <script>
        const API = '';

        function showMsg(text, type = 'success') {
            const area = document.getElementById('msg-area');
            area.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => area.innerHTML = '', 4000);
        }

        async function api(method, path, body) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(API + path, opts);
            if (!res.ok) {
                const err = await res.json().catch(() => ({ detail: 'Request failed' }));
                throw new Error(err.detail || 'Request failed');
            }
            return res.status === 204 ? null : res.json();
        }

        async function loadDashboard() {
            try {
                const data = await api('GET', '/api/system/dashboard');
                document.getElementById('stat-pipelines').textContent = data.pipelines;
                document.getElementById('stat-workers').textContent = data.workers;
            } catch (e) {
                showMsg('Failed to load dashboard: ' + e.message, 'error');
            }
        }

        async function loadPipelines() {
            try {
                const data = await api('GET', '/api/pipelines');
                const tbody = document.getElementById('pipelines-tbody');
                tbody.innerHTML = data.map(p => `
                    <tr>
                        <td>${p.name}</td>
                        <td>${p.plugin_id}</td>
                        <td class="${p.enabled ? 'status-enabled' : 'status-disabled'}">${p.enabled ? 'Enabled' : 'Disabled'}</td>
                        <td>${new Date(p.created_at).toLocaleDateString()}</td>
                        <td class="actions">
                            <button class="secondary" onclick="togglePipeline('${p.id}', ${!p.enabled})">${p.enabled ? 'Disable' : 'Enable'}</button>
                            <button class="danger" onclick="deletePipeline('${p.id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                showMsg('Failed to load pipelines: ' + e.message, 'error');
            }
        }

        async function createPipeline() {
            const name = document.getElementById('pl-name').value.trim();
            const plugin_id = document.getElementById('pl-plugin').value;
            if (!name) return showMsg('Pipeline name required', 'error');
            try {
                await api('POST', '/api/pipelines', { name, plugin_id, config: {}, enabled: true });
                document.getElementById('pl-name').value = '';
                showMsg('Pipeline created');
                loadPipelines();
                loadDashboard();
            } catch (e) {
                showMsg(e.message, 'error');
            }
        }

        async function togglePipeline(id, enabled) {
            try {
                await api('PUT', `/api/pipelines/${id}`, { enabled });
                showMsg('Pipeline updated');
                loadPipelines();
            } catch (e) {
                showMsg(e.message, 'error');
            }
        }

        async function deletePipeline(id) {
            if (!confirm('Delete pipeline and all related data?')) return;
            try {
                await api('DELETE', `/api/pipelines/${id}`);
                showMsg('Pipeline deleted');
                loadPipelines();
                loadDashboard();
            } catch (e) {
                showMsg(e.message, 'error');
            }
        }

        async function loadWorkers() {
            try {
                const data = await api('GET', '/api/workers');
                const tbody = document.getElementById('workers-tbody');
                tbody.innerHTML = data.map(w => `
                    <tr>
                        <td>${w.platform}</td>
                        <td>${w.display_name}</td>
                        <td>${w.schedule_cron || '-'}</td>
                        <td class="${w.enabled ? 'status-enabled' : 'status-disabled'}">${w.enabled ? 'Enabled' : 'Disabled'}</td>
                        <td class="actions">
                            <button class="secondary" onclick="toggleWorker('${w.id}', ${!w.enabled})">${w.enabled ? 'Disable' : 'Enable'}</button>
                            <button class="danger" onclick="deleteWorker('${w.id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                showMsg('Failed to load workers: ' + e.message, 'error');
            }
        }

        async function createWorker() {
            const platform = document.getElementById('wk-platform').value;
            const display_name = document.getElementById('wk-name').value.trim();
            if (!display_name) return showMsg('Worker name required', 'error');
            try {
                await api('POST', '/api/workers', { platform, display_name, credentials: {}, enabled: true });
                document.getElementById('wk-name').value = '';
                showMsg('Worker created');
                loadWorkers();
                loadDashboard();
            } catch (e) {
                showMsg(e.message, 'error');
            }
        }

        async function toggleWorker(id, enabled) {
            try {
                await api('PUT', `/api/workers/${id}`, { enabled });
                showMsg('Worker updated');
                loadWorkers();
            } catch (e) {
                showMsg(e.message, 'error');
            }
        }

        async function deleteWorker(id) {
            if (!confirm('Delete worker?')) return;
            try {
                await api('DELETE', `/api/workers/${id}`);
                showMsg('Worker deleted');
                loadWorkers();
                loadDashboard();
            } catch (e) {
                showMsg(e.message, 'error');
            }
        }

        async function loadActivity() {
            try {
                const data = await api('GET', '/api/system/activity?limit=10');
                const tbody = document.getElementById('activity-tbody');
                tbody.innerHTML = data.events.map(e => `
                    <tr>
                        <td>${new Date(e.timestamp).toLocaleString()}</td>
                        <td class="status-${e.level === 'error' || e.level === 'critical' ? 'rejected' : e.level === 'warn' ? 'pending' : 'approved'}">${e.level}</td>
                        <td>${e.event_type}</td>
                        <td>${e.message}</td>
                    </tr>
                `).join('');
            } catch (e) {
                // Silent fail for activity log
            }
        }

        // Initial load
        loadDashboard();
        loadPipelines();
        loadWorkers();
        loadActivity();

        // Refresh every 30 seconds
        setInterval(() => {
            loadDashboard();
            loadPipelines();
            loadWorkers();
            loadActivity();
        }, 30000);
    </script>
</body>
</html>
